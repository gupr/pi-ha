<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Inköpslista - Pi-Hem</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* Progress bar */
    .progress-container {
      max-width: 500px;
      margin: 0 auto 2rem auto;
      text-align: center;
    }

    .progress-bar {
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--primary);
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>

</head>
<body>

<h1>Inköpslista</h1>

<p class="subtitle">
  Bocka av det du har köpt
</p>

<!-- PROGRESS -->
<div class="progress-container">
  <div class="progress-text" id="progressText">0 / 0 klara</div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<div class="nav">
  <a href="index.html">← Guide</a>
  <a href="felsokning.html">Felsökning</a>
</div>

<!-- BAS -->
<div class="card section-pi">
<details open>
<summary>Bas (Raspberry Pi)</summary>

<ul class="checklist">
<li><label><input type="checkbox"> <a href="https://www.electrokit.com/raspberry-pi-5-2gb" target="_blank">Raspberry Pi (minst 2GB modellen)</a></label></li>
<li><label><input type="checkbox"> <a href="https://www.electrokit.com/stromforsorjning-27w-usb-c-raspberry-pi-vit" target="_blank">Raspberry Pi strömadapter 27W</a></label></li>
<li><label><input type="checkbox"> <a href="https://www.electrokit.com/inbyggnadslada-for-raspberry-pi-5-rod/vit" target="_blank">Pi-inbyggnadslåda med fläkt</a></label></li>
<li><label><input type="checkbox"> MicroSD-kort (minst 64GB)</label></li>
</ul>

</details>
</div>

<!-- ZIGBEE -->
<div class="card section-zigbee">
<details>
<summary>Zigbee</summary>

<ul class="checklist">
<li><label><input type="checkbox"> <a href="https://www.inet.se/produkt/8309980/sonoff-zigbee-3-0-usb-dongle-plus" target="_blank">Sonoff Zigbee 3.0 USB Dongle Plus</a></label></li>
<li><label><input type="checkbox"> USB-A förlängning</label></li>
</ul>

</details>
</div>

<!-- SENSOR -->
<div class="card section-sensor">
<details>
<summary>Sensorer</summary>

<ul class="checklist">
<li><label><input type="checkbox"> Temperatur + luftfuktighetssensor (Zigbee)</label></li>
</ul>

<p><b>Var kan man köpa:</b></p>
<ul>
<li><a href="https://www.kjell.com/se/produkter/smarta-hem/smarta-sensorer" target="_blank">Kjell & Company</a></li>
<li><a href="https://www.webhallen.com/se/category/15964-Sensorer-och-Tillbehor" target="_blank">Webhallen</a></li>
</ul>

<p style="margin-top:10px;">
  Viktigt: Måste stödja <b>Zigbee</b> och fungera med Home Assistant.
</p>

</details>
</div>

<!-- KAMERA -->
<div class="card section-camera">
<details>
<summary>Kamera</summary>

<ul class="checklist">
<li><label><input type="checkbox"> <a href="https://www.kjell.com/se/produkter/sakerhet-overvakning/kameraovervakning/overvakningskameror/overvakningskameror-utomhus" target="_blank">IP-kamera (utomhus/inomhus)</a></label></li>
</ul>

<p style="margin-top:10px;">
  Tips: Välj kamera som stödjer <b>RTSP eller ONVIF</b>.
</p>

</details>
</div>

<script>
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');
  const progressText = document.getElementById('progressText');
  const progressFill = document.getElementById('progressFill');

  function updateProgress() {
    const total = checkboxes.length;
    const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;

    progressText.textContent = `${checked} / ${total} klara`;
    progressFill.style.width = (checked / total) * 100 + "%";
  }

  checkboxes.forEach(cb => {
    cb.addEventListener('change', updateProgress);
  });

  updateProgress();
</script>

</body>
</html>
