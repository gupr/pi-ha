<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Inköpslista - Pi-Hem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Inköpslista</h1>
<p class="subtitle">
  Bocka av det du har köpt
</p>

<div class="nav">
  <a href="index.html">← Guide</a>
  <a href="felsokning.html">Felsökning</a>
</div>

<!-- BAS -->
<div class="card section-pi">
<details open>
<summary>Bas (Raspberry Pi)</summary>

<ul class="checklist">
<li>
  <label>
    <input type="checkbox">
    <a href="https://www.electrokit.com/raspberry-pi-5-2gb" target="_blank">
      Raspberry Pi (minst 2GB modellen)
    </a>
  </label>
</li>

<li>
  <label>
    <input type="checkbox">
    <a href="https://www.electrokit.com/stromforsorjning-27w-usb-c-raspberry-pi-vit" target="_blank">
      Raspberry Pi strömadapter 27W
    </a>
  </label>
</li>

<li>
  <label>
    <input type="checkbox">
    <a href="https://www.electrokit.com/inbyggnadslada-for-raspberry-pi-5-rod/vit" target="_blank">
      Pi-inbyggnadslåda med fläkt
    </a>
  </label>
</li>

<li>
  <label>
    <input type="checkbox">
      MicroSD-kort (minst 64GB)
  </label>
</li>

</ul>

</details>
</div>

<!-- ZIGBEE -->
<div class="card section-zigbee">
<details>
<summary>Zigbee</summary>

<ul class="checklist">

<li>
  <label>
    <input type="checkbox">
    <a href="https://www.inet.se/produkt/8309980/sonoff-zigbee-3-0-usb-dongle-plus" target="_blank">
      Sonoff Zigbee 3.0 USB Dongle Plus
    </a>
  </label>
</li>

<li>
  <label>
    <input type="checkbox">
      USB-A förlängning
  </label>
</li>

</ul>

</details>
</div>

<!-- SENSORER -->
<div class="card section-sensor">
<details>
<summary>Sensorer</summary>

<ul class="checklist">

<li>
  <label>
    <input type="checkbox">
      Sensorer (WIP)
  </label>
</li>

</ul>

</details>
</div>

</body>
</html>
